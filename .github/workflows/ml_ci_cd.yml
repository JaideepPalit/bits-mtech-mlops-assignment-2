  ML-CD-Pipeline:
    runs-on: ubuntu-latest
    needs: ML-CI-Pipeline

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create Kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG_DATA }}" | base64 --decode > ~/.kube/config
          
      - name: Set Kubernetes Context
        uses: azure/k8s-set-context@v3
        with:
          method: kubeconfig
          # Point to the file we just created instead of the secret directly
          kubeconfig: ~/.kube/config

      - name: Debug Config Structure
        run: |
          cat ~/.kube/config | head -c 20

      - name: Deploy to Kubernetes
        uses: azure/k8s-deploy@v4
        with:
          action: deploy
          namespace: bits
          manifests: |
            charts/deployment.yaml
          # This replaces 'my-repo/my-app' in your YAML with the specific SHA tag
          images: |
            ${{ secrets.DOCKERHUB_USERNAME }}/bits_mtech_mlops_2:${{ github.sha }}
      - name: Debug Kubernetes Failure
        run: |
          kubectl get pods

  Smoke-Test:
    name: Smoke Test
    runs-on: ubuntu-latest
    needs: ML-CD-Pipeline   

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install curl & jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Health Check
        run: |
          echo "Checking /health endpoint..."
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://34.102.150.120/health)

          if [ "$STATUS" -ne 200 ]; then
            echo "Health check failed with status $STATUS"
            exit 1
          fi

          echo "Health check passed"

      - name: Predict API Test
        run: |
          echo "Testing /predict endpoint..."

          RESPONSE=$(curl -s -w "\n%{http_code}" \
            --request POST \
            --url http://34.102.150.120/predict \
            --header 'content-type: multipart/form-data' \
            --form file=@data/preprocessed/preprocessed_cats_dogs_images/test/Dog/51.jpg)

          BODY=$(echo "$RESPONSE" | head -n -1)
          STATUS=$(echo "$RESPONSE" | tail -n1)

          echo "Response body: $BODY"
          echo "Status code: $STATUS"

          if [ "$STATUS" -ne 200 ]; then
            echo "Predict endpoint failed"
            exit 1
          fi

          echo "Smoke test passed"