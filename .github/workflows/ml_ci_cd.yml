  ML-CD-Pipeline:
    runs-on: ubuntu-latest
    needs: ML-CI-Pipeline

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install gcloud + gke-gcloud-auth-plugin
        uses: google-github-actions/setup-gcloud@v3
        with:
          version: 'latest'
          install_components: 'gke-gcloud-auth-plugin'

      # Recreate kubeconfig
      - name: Setup kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBECONFIG_DATA }}" | base64 -d > $HOME/.kube/config
          chmod 600 $HOME/.kube/config

      # Verify cluster connection
      - name: Test cluster access
        run: kubectl get nodes

      # Deploy
      - name: Deploy to Kubernetes
        run: |
          kubectl set image deployment/cats-dogs-api \
          cats-dogs-api=${{ secrets.DOCKERHUB_USERNAME }}/bits_mtech_mlops_2:$GITHUB_SHA

  Smoke-Test:
    name: Smoke Test
    runs-on: ubuntu-latest
    needs: ML-CD-Pipeline   

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install curl & jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Health Check
        run: |
          echo "Checking /health endpoint..."
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://34.102.150.120/health)

          if [ "$STATUS" -ne 200 ]; then
            echo "Health check failed with status $STATUS"
            exit 1
          fi

          echo "Health check passed"

      - name: Predict API Test
        run: |
          echo "Testing /predict endpoint..."

          RESPONSE=$(curl -s -w "\n%{http_code}" \
            --request POST \
            --url http://34.102.150.120/predict \
            --header 'content-type: multipart/form-data' \
            --form file=@data/preprocessed/preprocessed_cats_dogs_images/test/Dog/51.jpg)

          BODY=$(echo "$RESPONSE" | head -n -1)
          STATUS=$(echo "$RESPONSE" | tail -n1)

          echo "Response body: $BODY"
          echo "Status code: $STATUS"

          if [ "$STATUS" -ne 200 ]; then
            echo "Predict endpoint failed"
            exit 1
          fi

          echo "Smoke test passed"